services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: axcess-backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - APP_NAME=${APP_NAME}
      - APP_ENV=production
      - ALLOW_ORIGINS=${ALLOW_ORIGINS}
      - PYTHONPATH=/app
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: always
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://10.0.0.1/api
    container_name: axcess-frontend
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: axcess-nginx
    network_mode: host
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  db_data:

networks:
  internal:
    driver: bridge